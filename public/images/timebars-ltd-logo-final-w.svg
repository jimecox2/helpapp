<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 88">
  <!-- 5 Horizontal Bars - starting 20px from top and left -->
  <rect x="20" y="20" width="48" height="8" fill="#6B3A0E" rx="1"/>
  <rect x="20" y="30" width="48" height="8" fill="#22A34A" rx="1"/>
  <rect x="20" y="40" width="48" height="8" fill="#E87D0D" rx="1"/>
  <rect x="20" y="50" width="48" height="8" fill="#3B82F6" rx="1"/>
  <rect x="20" y="60" width="48" height="8" fill="#D4A017" rx="1"/>
  
  <!-- Timebars Ltd. Text -->
  <text x="75" y="50" font-family="Helvetica Neue, Helvetica, sans-serif" font-size="40" font-weight="500" fill="#fafafaff">Timebars Ltd.</text>
  
  <!-- Tagline - fine-tuned spacing to align PPM with Ltd. -->
  <text x="82" y="68" font-family="Helvetica Neue, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#fffefeff" letter-spacing="0.2">
    <tspan>Agile PM</tspan>
    <tspan dx="10">|</tspan>
    <tspan dx="10">Classic PM</tspan>
    <tspan dx="10">|</tspan>
    <tspan dx="10">PPM</tspan>
  </text>
</svg>
